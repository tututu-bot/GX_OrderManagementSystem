<!DOCTYPE html>
<html lang="zh-CN">
<!--
    ============================================================
    【管兴订单管理系统 - 登录页面】
    ============================================================
    页面功能：用户登录入口，输入账号密码验证后进入系统主页面
    设计风格：Anthropic 极简风格
        - 纯白背景，大量留白
        - 紫罗兰色 (#6B4BFF) 作为品牌强调色
        - 圆角 8px，细边框，无多余装饰
    技术栈：Vue 3 + Element Plus（CDN 引入）

    【页面执行顺序】
    1. 浏览器加载 HTML，按顺序引入 CSS 和 JS
    2. Vue 应用挂载到 #app 元素
    3. 渲染登录表单，等待用户交互

    【登录流程 - JWT Token 方式】
    1. 用户输入账号密码 → 点击"登录"
    2. 前端校验表单
    3. 调用 POST /api/user/login → 后端返回 { token, user }
    4. Token 存入 localStorage，后续请求自动携带
    5. 跳转系统主页面
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 管兴订单管理系统</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6B4BFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="管兴订单系统">
    <link rel="apple-touch-icon" href="/icon-logo.jpeg">
    <!-- Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.9.0/dist/index.css">
    <!-- Inter 字体 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

    <style>
        /* ========== Anthropic 极简风格基础样式 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #FAFAFA;
            color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ---------- 登录卡片 ---------- */
        .login-card {
            width: 100%;
            max-width: 400px;
            background: #FFFFFF;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 48px 40px;
        }

        /* ---------- 标题区域 ---------- */
        .login-header {
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .login-header p {
            font-size: 15px;
            color: #666666;
            line-height: 1.5;
        }

        /* ---------- 表单区域 ---------- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            font-size: 15px;
            font-family: inherit;
            color: #1A1A1A;
            background: #FFFFFF;
            border: 1px solid #E5E5E5;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input::placeholder {
            color: #9CA3AF;
        }

        .form-input:focus {
            border-color: #6B4BFF;
            box-shadow: 0 0 0 3px rgba(107, 75, 255, 0.1);
        }

        /* ---------- 按钮 ---------- */
        .btn-primary {
            width: 100%;
            height: 44px;
            margin-top: 8px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            color: #FFFFFF;
            background: #6B4BFF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #5538D9;
        }

        .btn-primary:disabled {
            background: #C4B5FD;
            cursor: not-allowed;
        }

        /* ---------- 底部链接 ---------- */
        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #666666;
        }

        .login-footer a {
            color: #6B4BFF;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* ---------- 错误提示 ---------- */
        .error-msg {
            margin-top: 4px;
            font-size: 13px;
            color: #DC2626;
        }

        @media (max-width: 768px) {
            body { padding: 16px; align-items: flex-start; padding-top: 10vh; }
            .login-card { padding: 32px 20px; border-radius: 12px; }
            .login-header h1 { font-size: 20px; }
            .login-header p { font-size: 14px; }
            .form-input { height: 44px; font-size: 16px; }
            .btn-primary { height: 48px; font-size: 16px; }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <!-- 标题 -->
        <div class="login-header">
            <h1>欢迎回来</h1>
            <p>登录管兴订单管理系统</p>
        </div>

        <!-- 登录表单 -->
        <form @submit.prevent="handleLogin">
            <!-- 账号 -->
            <div class="form-group">
                <label class="form-label">账号</label>
                <input
                    class="form-input"
                    type="text"
                    v-model="form.account"
                    placeholder="请输入账号"
                    :class="{ 'error': errors.account }"
                >
                <div v-if="errors.account" class="error-msg">{{ errors.account }}</div>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label class="form-label">密码</label>
                <input
                    class="form-input"
                    type="password"
                    v-model="form.password"
                    placeholder="请输入密码"
                    :class="{ 'error': errors.password }"
                >
                <div v-if="errors.password" class="error-msg">{{ errors.password }}</div>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="btn-primary" :disabled="loading">
                {{ loading ? '登录中...' : '登录' }}
            </button>
        </form>

        <!-- 底部链接 -->
        <div class="login-footer">
            还没有账号？<a @click="goRegister">立即注册</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus@2.9.0/dist/index.full.js"></script>
<script>
    const { createApp, ref, reactive } = Vue;
    const { ElMessage } = ElementPlus;

    createApp({
        setup() {
            /* ========== 数据定义 ========== */
            // loading: 登录按钮加载状态
            const loading = ref(false);

            // form: 登录表单数据
            const form = reactive({
                account: '',
                password: ''
            });

            // errors: 表单校验错误信息
            const errors = reactive({
                account: '',
                password: ''
            });

            /* ========== 表单校验 ========== */
            const validate = () => {
                let valid = true;
                errors.account = '';
                errors.password = '';

                if (!form.account.trim()) {
                    errors.account = '请输入账号';
                    valid = false;
                }
                if (!form.password) {
                    errors.password = '请输入密码';
                    valid = false;
                }
                return valid;
            };

            /* ========== 登录处理 ========== */
            const handleLogin = async () => {
                if (!validate()) return;

                loading.value = true;
                try {
                    const res = await fetch('/api/user/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            account: form.account,
                            password: form.password
                        })
                    });
                    const result = await res.json();

                    if (result.code !== 200) {
                        ElMessage.error(result.message || '登录失败');
                        return;
                    }

                    // 保存 Token 和用户信息到 localStorage
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.data.user));

                    ElMessage.success('登录成功');
                    window.location.href = '/index.html';

                } catch (e) {
                    ElMessage.error('网络错误，请稍后重试');
                } finally {
                    loading.value = false;
                }
            };

            /* ========== 跳转注册页 ========== */
            const goRegister = () => {
                window.location.href = '/register.html';
            };

            return { form, errors, loading, handleLogin, goRegister };
        }
    }).use(ElementPlus).mount('#app');
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
